server {
    listen 80;
    server_name your-level-up.ru;

    location ^~/.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://frontend.level-up:80;
    }
}

